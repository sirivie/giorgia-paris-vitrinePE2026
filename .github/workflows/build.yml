name: Build & Deploy

on:
  # Rebuild automatique toutes les 2 heures (heure UTC).
  schedule:
    - cron: '0 */2 * * *'

  # Bouton "Run workflow" dans l'onglet Actions de GitHub — pour forcer
  # un rebuild immédiat après une modif dans Airtable.
  workflow_dispatch: {}

  # Rebuild automatique si le template, le script ou le workflow
  # lui-même changent (pas besoin pour une simple modif Airtable).
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/**'

# Empêche deux builds de tourner en parallèle (évite les conflits sur gh-pages).
concurrency:
  group: build-deploy
  cancel-in-progress: false

# Nécessaire pour que l'action de déploiement puisse pusher sur gh-pages.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Marge confortable : même avec 108 images à télécharger+compresser, on tient
    # largement en 5 min grâce au cache. La première exécution (cache froid)
    # peut prendre 3-4 min.
    timeout-minutes: 10

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installation des dépendances (Sharp pour le traitement d'image)
        # On utilise `npm install` plutôt que `npm ci` car le repo ne contient
        # pas de package-lock.json (pas obligatoire pour ce projet à 1 seule
        # dépendance — Sharp). Le lock file serait nécessaire pour `npm ci`.
        run: npm install --no-audit --no-fund

      # Cache des images compressées entre les builds. Clé basée sur le nom
      # du repo — ne change jamais, donc le cache est partagé entre toutes
      # les exécutions. Les images non modifiées sont instantanément réutilisées.
      - name: Restauration du cache d'images
        uses: actions/cache@v4
        with:
          path: .image-cache
          key: images-${{ github.repository }}
          restore-keys: |
            images-${{ github.repository }}

      - name: Génération du site statique
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ vars.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ vars.AIRTABLE_TABLE_NAME }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          # BASE_PATH : préfixe d'URL pour la qualif (sirivie.github.io/<repo>/)
          # En prod (CUSTOM_DOMAIN défini), reste vide. En qualif, c'est le nom du repo.
          BASE_PATH: ${{ vars.CUSTOM_DOMAIN && '' || format('/{0}', github.event.repository.name) }}
          # GITHUB_PAGES_ORIGIN : sert pour les URLs canoniques en qualif
          # (sitemap.xml, og:url, JSON-LD). Pas utilisé en prod.
          GITHUB_PAGES_ORIGIN: ${{ vars.CUSTOM_DOMAIN && '' || format('https://{0}.github.io', github.repository_owner) }}
        run: node scripts/build.mjs

      - name: Déploiement sur la branche gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Build from Airtable — ${{ github.event_name }}'
